name: SonarQube + JFrog Artifact Scan & Upload

on:
  push:
    branches: [ "sit" ]
  workflow_dispatch:

env:
  JFROG_URL: 'https://trial9cn0pa.jfrog.io'
  ARTIFACTORY_REPO: 'dotnet-generic-local'
  NUGET_REPO: 'nuget-local'
  BUILD_NAME: 'SIT-simple-web-app'
  XRAY_WATCH: 'firdaus-watches'
  SONAR_HOST_URL: 'http://3.0.10.146:9000'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    environment: JFROG_PASSWORD

    steps:
      # ---------------------------
      # 1. Checkout
      # ---------------------------
      - name: 🏗️ Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # 2. SonarQube (RUN FIRST)
      # ---------------------------
      - name: ☕ Setup Java (Sonar requirement)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📥 Install SonarScanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          echo "$(pwd)/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: 🔍 Run SonarQube Scan (Security + Code Quality)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=vuln-dotnet-app \
            -Dsonar.sources=. \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN

      # (Optional but recommended)
      # Wait for Quality Gate result (fail early if bad)
      - name: 🚨 SonarQube Quality Gate
        run: |
          echo "Add Quality Gate check if needed (can integrate via API or Sonar Action)"

      # ---------------------------
      # 3. Setup .NET
      # ---------------------------
      - name: ☕ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ---------------------------
      # 4. Setup JFrog CLI
      # ---------------------------
      - name: ⚙️ Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USER }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      # ---------------------------
      # 5. Configure JFrog
      # ---------------------------
      - name: ⚙️ Configure JFrog .NET
        run: jf dotnet-config --repo-resolve=${{ env.NUGET_REPO }}

      # ---------------------------
      # 6. Build
      # ---------------------------
      - name: 📦 Build & Capture "Recipe"
        run: |
          jf dotnet restore SimpleWebApp.csproj --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}
          jf dotnet build SimpleWebApp.csproj --no-restore --configuration Release --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}

          dotnet publish SimpleWebApp.csproj --no-restore --configuration Release -o ./publish_output

      # ---------------------------
      # 7. Upload Artifact
      # ---------------------------
      - name: 🚀 Upload Artifact to Artifactory
        run: |
          jf rt upload "publish_output/*" \
            "${{ env.ARTIFACTORY_REPO }}/SimpleWebApp/${{ github.run_number }}/" \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      # ---------------------------
      # 8. Xray Scan
      # ---------------------------
      - name: 📊 Publish Build Info & Scan
        run: |
          jf rt build-publish ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf build-scan --fail=true ${{ env.BUILD_NAME }} ${{ github.run_number }}

      # ---------------------------
      # 9. Security Gate
      # ---------------------------
      - name: 🚨 Security Gate
        if: failure()
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE: FAILED ❌"
          echo "========================================="
          echo "Issues found in SonarQube or Xray scan!"
          exit 1
