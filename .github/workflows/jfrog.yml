name: .NET Build, Docker Check & JFrog Scan

on:
  push:
    branches: [ "sit" ]
  pull_request:
    branches: [ "sit" ]
  workflow_dispatch:

env:
  JFROG_URL: 'https://trial9cn0pa.jfrog.io' # Ensure this is your correct JFrog URL
  ARTIFACTORY_REPO: 'dotnet-generic-local'   # UPDATE THIS: Change to your target Artifactory repository name
  BUILD_NAME: 'SIT-simple-web-app'
  XRAY_WATCH: 'firdaus-watches'
  JF_USER: 'firdaus.ghazali@izeno.com'

jobs:
  build-and-scan:
    name: Build, Scan & Upload
    runs-on: ubuntu-latest
    environment: JFROG_PASSWORD # Uncomment if you use GitHub Environments for secrets
    
    steps:
      - name: 🏗️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: ⚙️ Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USER }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      # --- FIX 2: Scan the RAW SOURCE CODE for SAST/Secrets before building ---
      #- name: 🔍 JFrog Advanced Security Scan (SAST & Secrets)
      #  run: |
       #   echo "Scanning raw source code for SQLi, XSS, and hardcoded secrets..."
      #    jf scan ./ --vuln=true --secrets=true --sast=true --exclusions="*.git*;*obj*;*bin*;*wwwroot/lib*"
     #   env:
       #   JFROG_CLI_EXCLUSIONS: "*.git*;*obj*;*bin*;*wwwroot/lib*;*.scannerwork*"

      # --- FIX 1: Use 'jf dotnet' to capture the dependency tree ---
      - name: 📦 Restore & Build .NET application (JFrog Wrapped)
        run: |
          # 1. Create the config file for the dotnet wrapper
          # Replace 'nuget-virtual' with the name of your NuGet repository in JFrog
          jf dotnet-config --repo-resolve=nuget-virtual
          
          # 2. Now jf dotnet will work
          jf dotnet restore SimpleWebApp.csproj --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}
          jf dotnet build SimpleWebApp.csproj --no-restore --configuration Release --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}

      - name: 📂 Publish .NET App (Create Artifact)
        run: dotnet publish SimpleWebApp.csproj --no-restore --configuration Release -o ./publish_output

      - name: 🚀 Upload to Artifactory
        run: |
          jf rt upload "publish_output/*" \
            "${{ env.ARTIFACTORY_REPO }}/SimpleWebApp/${{ github.run_number }}/" \
            --flat=false \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      - name: 📊 Publish Build Info
        if: success() 
        run: |
          jf rt build-collect-env ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf rt build-publish ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🔒 Xray Build Scan
        if: success()
        run: jf build-scan --fail=true ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🚨 Security Gate Evaluation
        if: failure() 
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE: FAILED ❌"
          echo "========================================="
          echo "Scanning failed because critical security vulnerabilities were detected!"
          exit 1
