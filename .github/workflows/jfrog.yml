name: JFrog Security Scan & Upload

on:
  push:
    branches: [ "sit" ]
  pull_request:
    branches: [ "sit" ]
  workflow_dispatch:

env:
  JFROG_URL: 'https://trial9cn0pa.jfrog.io'
  ARTIFACTORY_REPO: 'dotnet-generic-local' # Generic repo for the .dlls
  NUGET_REPO: 'nuget-local'              # Replace with your actual NuGet repo name
  BUILD_NAME: 'SIT-simple-web-app'
  XRAY_WATCH: 'firdaus-watches'
  JF_USER: 'firdaus.ghazali@izeno.com'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    environment: JFROG_PASSWORD

    steps:
      - name: 🏗️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: ⚙️ Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USER }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      - name: ⚙️ Configure JFrog .NET
        run: |
          # Same as 'jf mvnc' - tells the CLI where to resolve packages
          jf dotnet-config --repo-resolve=${{ env.NUGET_REPO }}

      - name: 📦 Build, Capture Dependencies & Upload
        run: |
          # Captures the dependency tree (SCA) exactly like 'jf mvn clean install'
          jf dotnet restore SimpleWebApp.csproj --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}
          jf dotnet build SimpleWebApp.csproj --no-restore --configuration Release --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}
          
          # Create the deployable package
          dotnet publish SimpleWebApp.csproj --no-restore --configuration Release -o ./publish_output
          
          # Upload artifacts to Artifactory
          jf rt upload "publish_output/*" \
            "${{ env.ARTIFACTORY_REPO }}/SimpleWebApp/${{ github.run_number }}/" \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      - name: 📊 Publish Build Info
        if: success() 
        run: |
          jf rt build-collect-env ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf rt build-publish ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🔒 Xray Build Scan
        if: success()
        run: |
          # This triggers the server-side Xray scan against your Watch/Policy
          jf build-scan --fail=true ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🚨 Security Gate Evaluation
        if: failure() 
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE: FAILED ❌"
          echo "========================================="
          echo "Scanning failed because critical security vulnerabilities were detected!"
          exit 1
